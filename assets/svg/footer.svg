<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Main Neon Gradient -->

    <linearGradient id="neonWave" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#00D9FF"/>
      <stop offset="25%" stop-color="#38BDF8"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="80%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>

    <!-- Secondary Accent -->

    <linearGradient id="secondaryWave" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <!-- Glow -->

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Blur Background -->

    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#050816" stop-opacity="0"/>
    </radialGradient>

  </defs>

  <!-- Transparent Base -->

  <rect width="1200" height="260" fill="transparent"/>

  <!-- Background Glow -->

  <ellipse cx="600"
           cy="160"
           rx="500"
           ry="120"
           fill="url(#bgGlow)"
           opacity="0.8"/>

  <!-- Top Accent Line -->

  <line x1="0"
        y1="3"
        x2="1200"
        y2="3"
        stroke="url(#neonWave)"
        stroke-width="2"
        opacity="0.9"/>

  <!-- Main Wave -->

  <path
    fill="url(#neonWave)"
    opacity="0.28"
    filter="url(#softGlow)">

    <animate attributeName="d"
      dur="5s"
      repeatCount="indefinite"
      values="
      M0 120 C180 190 360 40 560 110 C760 180 940 50 1200 130 L1200 260 L0 260 Z;
      M0 145 C220 60 420 210 650 120 C900 40 1050 190 1200 90 L1200 260 L0 260 Z;
      M0 120 C180 190 360 40 560 110 C760 180 940 50 1200 130 L1200 260 L0 260 Z
      "/>

  </path>

  <!-- Secondary Layer -->

  <path
    fill="url(#secondaryWave)"
    opacity="0.16">

    <animate attributeName="d"
      dur="7s"
      repeatCount="indefinite"
      values="
      M0 170 C220 100 420 220 660 160 C920 90 1080 200 1200 140 L1200 260 L0 260 Z;
      M0 190 C260 80 470 240 710 150 C930 70 1090 230 1200 120 L1200 260 L0 260 Z;
      M0 170 C220 100 420 220 660 160 C920 90 1080 200 1200 140 L1200 260 L0 260 Z
      "/>

  </path>

</svg>