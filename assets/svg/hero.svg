<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="400" fill="#050816"/>

  <!-- Definitions -->
  <defs>

    <!-- Main Gradient -->
    <linearGradient id="paint0" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D9FF"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>

    <!-- Mountains -->
    <linearGradient id="mountain1" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1E1B4B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>

    <linearGradient id="mountain2" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#312E81"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>

    <!-- Blur -->
    <filter id="blur">
      <feGaussianBlur stdDeviation="80"/>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="#050816"/>

  <!-- Animated Glow -->
  <circle cx="950" cy="80" r="180"
          fill="url(#paint0)"
          opacity="0.22"
          filter="url(#blur)">
    <animate attributeName="opacity"
             values="0.18;0.28;0.18"
             dur="6s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Accent Glow -->
  <circle cx="160" cy="250" r="140"
          fill="#00D9FF"
          opacity="0.08"
          filter="url(#blur)">
    <animate attributeName="opacity"
             values="0.05;0.12;0.05"
             dur="5s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Grid -->
  <g opacity="0.06">
    <path d="M0 50 H1200" stroke="white"/>
    <path d="M0 100 H1200" stroke="white"/>
    <path d="M0 150 H1200" stroke="white"/>
    <path d="M0 200 H1200" stroke="white"/>
    <path d="M0 250 H1200" stroke="white"/>
    <path d="M0 300 H1200" stroke="white"/>
    <path d="M0 350 H1200" stroke="white"/>

    <path d="M100 0 V400" stroke="white"/>
    <path d="M200 0 V400" stroke="white"/>
    <path d="M300 0 V400" stroke="white"/>
    <path d="M400 0 V400" stroke="white"/>
    <path d="M500 0 V400" stroke="white"/>
    <path d="M600 0 V400" stroke="white"/>
    <path d="M700 0 V400" stroke="white"/>
    <path d="M800 0 V400" stroke="white"/>
    <path d="M900 0 V400" stroke="white"/>
    <path d="M1000 0 V400" stroke="white"/>
    <path d="M1100 0 V400" stroke="white"/>
  </g>

  <!-- Animated Stars -->
  <circle cx="120" cy="70" r="2" fill="white">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>

  <circle cx="320" cy="120" r="2" fill="white">
    <animate attributeName="opacity" values="1;0.3;1" dur="4s" repeatCount="indefinite"/>
  </circle>

  <circle cx="620" cy="80" r="2" fill="white">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="920" cy="140" r="2" fill="white">
    <animate attributeName="opacity" values="1;0.2;1" dur="6s" repeatCount="indefinite"/>
  </circle>

  <circle cx="1080" cy="60" r="2" fill="white">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>

  <circle cx="800" cy="50" r="1.5" fill="white"/>
  <circle cx="450" cy="90" r="1.5" fill="white"/>
  <circle cx="1050" cy="180" r="1.5" fill="white"/>
  <circle cx="560" cy="40" r="1.5" fill="white"/>
  <circle cx="720" cy="110" r="1.5" fill="white"/>

  <!-- Mountains Back -->
  <path d="M0 320 L180 240 L320 300 L500 220 L720 310 L920 180 L1200 320 V400 H0 Z"
        fill="url(#mountain1)"
        opacity="0.75"/>

  <!-- Mountains Front -->
  <path d="M0 350 L150 280 L280 330 L430 250 L620 340 L760 260 L950 320 L1200 220 V400 H0 Z"
        fill="url(#mountain2)"/>

  <!-- Main Heading -->
  <text x="80"
        y="165"
        fill="white"
        font-size="72"
        font-family="Arial"
        font-weight="bold"
        letter-spacing="3">
    PIYUSH
  </text>

  <text x="80"
        y="235"
        fill="white"
        font-size="72"
        font-family="Arial"
        font-weight="bold"
        letter-spacing="3">
    AGGARWAL
  </text>

  <!-- Subtitle -->
  <text x="85"
        y="285"
        fill="#00D9FF"
        font-size="24"
        font-family="Arial">
    Full Stack Developer • Tech Enthusiast • Project Manager
  </text>

  <!-- Accent Line -->
  <rect x="85"
        y="315"
        width="450"
        height="4"
        rx="2"
        fill="url(#paint0)"/>

  <!-- Terminal Window -->
  <rect x="720"
        y="200"
        width="380"
        height="135"
        rx="16"
        fill="#0B1120"
        stroke="#1E293B"
        stroke-width="2"
        opacity="0.97"/>

  <!-- Terminal Header -->
  <rect x="720"
        y="200"
        width="380"
        height="30"
        rx="16"
        fill="#111827"/>

  <!-- Dots -->
  <circle cx="742" cy="215" r="5" fill="#EF4444"/>
  <circle cx="760" cy="215" r="5" fill="#F59E0B"/>
  <circle cx="778" cy="215" r="5" fill="#22C55E"/>

  <!-- Terminal Title -->
  <text x="840"
        y="219"
        fill="#94A3B8"
        font-size="12"
        font-family="monospace">
    piyush@github:~
  </text>

  <!-- Terminal Commands -->
  <text x="742"
        y="255"
        fill="#22C55E"
        font-size="16"
        font-family="monospace">
    > initializing systems...
  </text>

  <text x="742"
        y="282"
        fill="#38BDF8"
        font-size="16"
        font-family="monospace">
    > loading projects...
  </text>

  <text x="742"
        y="309"
        fill="#A78BFA"
        font-size="16"
        font-family="monospace">
    > status: online
    <tspan fill="white">_</tspan>

    <animate attributeName="opacity"
             values="1;0;1"
             dur="1s"
             repeatCount="indefinite"/>
  </text>

  <!-- Footer Label -->
  <text x="1180"
        y="340"
        fill="#94A3B8"
        font-size="16"
        font-family="monospace"
        transform="rotate(-90 1180 340)">
    BUILD • SCALE • INNOVATE
  </text>

</svg>