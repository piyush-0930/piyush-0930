<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="400" fill="#050816"/>

  <!-- Definitions -->
  <defs>

    <!-- Main Gradient -->
    <linearGradient id="paint0" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D9FF"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>

    <!-- Blur -->
    <filter id="blur">
      <feGaussianBlur stdDeviation="80"/>
    </filter>

  </defs>

  <!-- Main Glow -->
  <circle cx="960" cy="70" r="220"
          fill="url(#paint0)"
          opacity="0.18"
          filter="url(#blur)">

    <animate attributeName="opacity"
             values="0.14;0.24;0.14"
             dur="8s"
             repeatCount="indefinite"/>

  </circle>

  <!-- Accent Glow -->
  <circle cx="180" cy="260" r="160"
          fill="#00D9FF"
          opacity="0.08"
          filter="url(#blur)">

    <animate attributeName="opacity"
             values="0.04;0.12;0.04"
             dur="5s"
             repeatCount="indefinite"/>

  </circle>

  <!-- Engineering Grid -->
  <g opacity="0.06">

    <!-- Horizontal -->
    <path d="M0 50 H1200" stroke="white"/>
    <path d="M0 100 H1200" stroke="white"/>
    <path d="M0 150 H1200" stroke="white"/>
    <path d="M0 200 H1200" stroke="white"/>
    <path d="M0 250 H1200" stroke="white"/>
    <path d="M0 300 H1200" stroke="white"/>
    <path d="M0 350 H1200" stroke="white"/>

    <!-- Vertical -->
    <path d="M100 0 V400" stroke="white"/>
    <path d="M200 0 V400" stroke="white"/>
    <path d="M300 0 V400" stroke="white"/>
    <path d="M400 0 V400" stroke="white"/>
    <path d="M500 0 V400" stroke="white"/>
    <path d="M600 0 V400" stroke="white"/>
    <path d="M700 0 V400" stroke="white"/>
    <path d="M800 0 V400" stroke="white"/>
    <path d="M900 0 V400" stroke="white"/>
    <path d="M1000 0 V400" stroke="white"/>
    <path d="M1100 0 V400" stroke="white"/>

  </g>

  <!-- Animated Stars -->

  <circle cx="100" cy="80" r="2" fill="white">
    <animate attributeName="opacity"
             values="0.2;1;0.2"
             dur="3s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="280" cy="120" r="1.8" fill="white">
    <animate attributeName="opacity"
             values="1;0.3;1"
             dur="5s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="520" cy="60" r="2" fill="white">
    <animate attributeName="opacity"
             values="0.3;1;0.3"
             dur="4s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="760" cy="110" r="2" fill="white">
    <animate attributeName="opacity"
             values="1;0.2;1"
             dur="6s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="1040" cy="70" r="2" fill="white">
    <animate attributeName="opacity"
             values="0.2;1;0.2"
             dur="4s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="900" cy="180" r="1.5" fill="white"/>
  <circle cx="420" cy="90" r="1.5" fill="white"/>
  <circle cx="650" cy="45" r="1.5" fill="white"/>
  <circle cx="1110" cy="160" r="1.5" fill="white"/>
  <circle cx="840" cy="55" r="1.5" fill="white"/>

  <!-- Main Name -->

  <text x="80"
        y="205"
        fill="white"
        font-size="55"
        font-family="Arial"
        font-weight="bold"
        letter-spacing="3">

    PIYUSH AGGARWAL

  </text>

  <!-- Subtitle -->

  <text x="85"
        y="255"
        fill="#00D9FF"
        font-size="24"
        font-family="monospace"
        letter-spacing="1">

    SOFTWARE ENGINEER • PROJECT MANAGER

  </text>

  <!-- Status Line -->

  <text x="85"
        y="300"
        fill="#22C55E"
        font-size="16"
        font-family="monospace">

    ● SYSTEM STATUS : ONLINE

    <animate attributeName="opacity"
             values="0.7;1;0.7"
             dur="2s"
             repeatCount="indefinite"/>

  </text>

  <!-- Accent Divider -->

  <rect x="85"
        y="325"
        width="520"
        height="3"
        rx="2"
        fill="url(#paint0)">

    <animate attributeName="width"
             values="300;520;300"
             dur="6s"
             repeatCount="indefinite"/>

  </rect>

  <!-- Terminal Window -->

  <rect x="720"
        y="190"
        width="390"
        height="145"
        rx="18"
        fill="#0B1120"
        stroke="#1E293B"
        stroke-width="2"
        opacity="0.98"/>

  <!-- Terminal Header -->

  <rect x="720"
        y="190"
        width="390"
        height="34"
        rx="18"
        fill="#111827"/>

  <!-- Terminal Dots -->

  <circle cx="745" cy="207" r="5" fill="#EF4444"/>
  <circle cx="764" cy="207" r="5" fill="#F59E0B"/>
  <circle cx="783" cy="207" r="5" fill="#22C55E"/>

  <!-- Terminal Title -->

  <text x="850"
        y="211"
        fill="#94A3B8"
        font-size="12"
        font-family="monospace">

    piyush-0930@github:~

  </text>

  <!-- Terminal Content -->

  <text x="742"
        y="255"
        fill="#22C55E"
        font-size="16"
        font-family="monospace">

    > booting engineering systems...

  </text>

  <text x="742"
        y="282"
        fill="#38BDF8"
        font-size="16"
        font-family="monospace">

    > loading full-stack modules...

  </text>

  <text x="742"
        y="309"
        fill="#A78BFA"
        font-size="16"
        font-family="monospace">

    > identity confirmed

    <tspan fill="white">_</tspan>

    <animate attributeName="opacity"
             values="1;0;1"
             dur="1s"
             repeatCount="indefinite"/>

  </text>

  <!-- Side Label -->

  <text x="1180"
        y="340"
        fill="#64748B"
        font-size="15"
        font-family="monospace"
        transform="rotate(-90 1180 340)">

    BUILD • SCALE • ENGINEER

  </text>

</svg>