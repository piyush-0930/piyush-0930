<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">

<defs>

  <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720">
    <stop offset="0%" stop-color="#050816"/>
    <stop offset="100%" stop-color="#0B1120"/>
  </linearGradient>

  <linearGradient id="header" x1="0" y1="0" x2="1000" y2="0">
    <stop offset="0%" stop-color="#1E1B4B"/>
    <stop offset="100%" stop-color="#111827"/>
  </linearGradient>

  <linearGradient id="pythonBar" x1="0" y1="0" x2="800" y2="0">
    <stop offset="0%" stop-color="#F97316"/>
    <stop offset="100%" stop-color="#FACC15"/>
  </linearGradient>

  <linearGradient id="jsBar" x1="0" y1="0" x2="800" y2="0">
    <stop offset="0%" stop-color="#60A5FA"/>
    <stop offset="100%" stop-color="#2563EB"/>
  </linearGradient>

  <linearGradient id="reactBar" x1="0" y1="0" x2="800" y2="0">
    <stop offset="0%" stop-color="#FACC15"/>
    <stop offset="100%" stop-color="#EAB308"/>
  </linearGradient>

  <linearGradient id="nodeBar" x1="0" y1="0" x2="800" y2="0">
    <stop offset="0%" stop-color="#22C55E"/>
    <stop offset="100%" stop-color="#16A34A"/>
  </linearGradient>

  <linearGradient id="dbBar" x1="0" y1="0" x2="800" y2="0">
    <stop offset="0%" stop-color="#A855F7"/>
    <stop offset="100%" stop-color="#7C3AED"/>
  </linearGradient>

</defs>

<!-- BACKGROUND -->

<rect width="1200" height="720" fill="url(#bg)"/>

<!-- GRID -->

<g opacity="0.05">

  <path d="M0 60 H1200" stroke="white"/>
  <path d="M0 120 H1200" stroke="white"/>
  <path d="M0 180 H1200" stroke="white"/>
  <path d="M0 240 H1200" stroke="white"/>
  <path d="M0 300 H1200" stroke="white"/>
  <path d="M0 360 H1200" stroke="white"/>
  <path d="M0 420 H1200" stroke="white"/>
  <path d="M0 480 H1200" stroke="white"/>
  <path d="M0 540 H1200" stroke="white"/>
  <path d="M0 600 H1200" stroke="white"/>

  <path d="M100 0 V720" stroke="white"/>
  <path d="M200 0 V720" stroke="white"/>
  <path d="M300 0 V720" stroke="white"/>
  <path d="M400 0 V720" stroke="white"/>
  <path d="M500 0 V720" stroke="white"/>
  <path d="M600 0 V720" stroke="white"/>
  <path d="M700 0 V720" stroke="white"/>
  <path d="M800 0 V720" stroke="white"/>
  <path d="M900 0 V720" stroke="white"/>
  <path d="M1000 0 V720" stroke="white"/>
  <path d="M1100 0 V720" stroke="white"/>

</g>

