<rect x="20" y="10" width="360" height="42" rx="10" fill="#111827"/>

<text x="45"
      y="38"
      fill="#E2E8F0"
      font-size="18"
      font-family="monospace"
      font-weight="bold">
⚡ $ cat tech-stack.md
</text>

